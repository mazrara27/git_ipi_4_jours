<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="reset.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style_principale.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <main class="container text-center mt-5">
      <h1 class="display-4 fw-bold mb-4 text-dark">Développeur Fullstack</h1>

      <p class="lead mb-5 text-secondary">
        Je suis un développeur passionné, compétent en frontend et backend, avec
        un fort sens du design UX/UI.
      </p>

      <div class="row">
        <div class="col-md-4 mb-4">
          <div
            class="card p-4 shadow-sm border-0 bg-dark text-white h-100 hover-card"
          >
            <h3>Frontend</h3>
            <p>HTML, CSS, JavaScript</p>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div
            class="card p-4 shadow-sm border-0 bg-dark text-white h-100 hover-card"
          >
            <h3>Backend</h3>
            <p>PHP</p>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div
            class="card p-4 shadow-sm border-0 bg-dark text-white h-100 hover-card"
          >
            <h3>Design</h3>
            <p>UX / UI</p>
          </div>
        </div>
      </div>

      <button
        class="btn btn-warning btn-custom mt-4 px-4 py-2 fw-bold shadow-sm"
      >
        Me contacter
      </button>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
